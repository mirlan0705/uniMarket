<!DOCTYPE html>
<html lang="en">

    <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <link href="css/unimarket.css" rel="stylesheet" type="text/css">
    <script src="js/unimarket.js"></script>
    <title>UniMarket</title>
    </head>

    <body class="page-container">
        
    <!-- Header -->
    <header class="topbar">
    <!-- Left Action Buttons -->
    <div class="left-buttons">
        <button onclick="toggleMenu()">☰</button>
        <a href="/wishlist">Wishlist</a>
        <a href="/basket">Basket</a>
    </div>
     <!-- Right Action Buttons -->
    <div class="right-buttons">
        <a href="/loginregister">Log in/Register</a>
        <a href="/sellnow">Sell Now</a>
    </div>
    </header>

    <!-- Sidebar -->
    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <span class="menu-text">MENU</span>
        </div>
        <span class="category-text">CATEGORIES</span>
     <!-- Categories -->
     <ul class="menu">

        <li class="category">
            <div class="category-title" onclick="toggleCategory(this)">
                <span>Study & Tech</span>
                <img class="arrow-icon" src="images/arrowdown.png">
                </div>
            <ul class="subcategory">
               <li><a href="#">Laptops/Computing</a></li>
               <li><a href="#">Audio</a></li>
               <li><a href="#">Accessories</a></li>
               <li><a href="#">Chargers</a></li>
            </ul>
        </li>

        <li class="category">
            <div class="category-title" onclick="toggleCategory(this)">
                <span>Course Materials</span>
            <img class="arrow-icon" src="images/arrowdown.png">
            </div>
            <ul class="subcategory">
                <li><a href="#">Books</a></li>
            </ul>
        </li>

        <li class="category">
            <div class="category-title" onclick="toggleCategory(this)">
             <span>Uni Style & Clothes</span>
            <img class="arrow-icon" src="images/arrowdown.png">
            </div>
            <ul class="subcategory">
                <li><a href="#">Hoodies</a></li>
            </ul>
        </li>

        <li class="category">
            <div class="category-title" onclick="toggleCategory(this)">
                <span>Home & Halls</span>
            <img class="arrow-icon" src="images/arrowdown.png">
            </div>
            <ul class="subcategory">
                <li><a href="#">Kitchen</a></li>
            </ul>
        </li>
    </ul>
        </nav>

        <main>
             <!-- Logo -->
             <div class="logo">
               <h1>UniMarket</h1>
             </div>

             <!-- Search Bar -->
             <div class="search-container">
                <form>
                   <button class="all-btn" type="button">▼ All</button>
                   <input type="text" placeholder="Search for items...">
                   <button class="search-btn" type="submit">Search</button>
                </form>
             </div>
        </main>

    <footer>
        <p><a href="#">Contact Us</a></p>
        <p><a href="#">Terms and Conditions</a></p>
    </footer>
    
    </body>
</html>
