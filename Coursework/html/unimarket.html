<!DOCTYPE html>
<html lang="en">

    <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <link href="../css/unimarket.css" rel="stylesheet" type="text/css">
    <script src="../js/unimarket.js"></script>
    <title>UniMarket</title>
    </head>

    <body class="page-container">
    <canvas id="bg"></canvas>
        
    <nav id="navbar"></nav>

        <main>
             <!-- Logo -->
             <div class="logo">
               <h1>UniMarket</h1>
             </div>

             <!-- Search Bar -->
             <div class="search-container">
                <form action="/search">
                   <button class="all-btn" type="button">
                   <span>All</span>
                   <img src="../images/arrowdown.png" alt="dropdown" class="allbtn-icon">
                   </button>
                   <input id="search" type="text" placeholder="Search for items...">     
                   <button class="search-btn" type="submit">Search</button>
                </form>
             </div>

        </main>

    <!-- Listings -->
    <p class="section-label">Browse Listings</p>
    <div class="listings-grid" id="listings"></div>

    <footer>
        <p><a href="#">Contact Us</a></p>
        <p><a href="#">Terms and Conditions</a></p>
    </footer>
    
    </body>
</html>
