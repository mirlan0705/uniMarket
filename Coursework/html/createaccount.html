<!DOCTYPE html>
<html lang="en">

    <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <link href="../css/createaccount.css" rel="stylesheet" type="text/css">
    <script src="../js/createaccount.js"></script>
    <title>UniMarket</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    </head>

    <body class="page-container">
    <canvas id="bg"></canvas>   
    <!-- Header -->
    <header class="loginheader">
        <!-- Logo -->
      <a href="../html/unimarket.html"> <h1 class="logo">UniMarket</h1> </a>
    </header>
  
        <!-- FormCard -->
        <div class="centerwrapper">
        <main class="logincard">

            <h2>Create Account,</h2>

            <form id="createform" class="loginform">
                
              <div class="formrow">
                <div class="formrow">
                    <input id="name" type="text" placeholder="Name" required>
                </div>
                <div class="formrow">
                    <input id="surname" type="text" placeholder="Surname" required>
                </div>
              </div>
                <div class="forminput">
                    <input id="email" type="email" placeholder="Email" required>
                </div>
                <div class="forminput">
                    <input id="password" type="password" placeholder="Password" required>
                </div>

                <div class="forminput">
                    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                </div>
                     
                <div class="formlinks">
                    <p>Already have an account? <a href="../html/loginregister.html">Log In</a></p>
                </div>

                <p id="errorMsg"></p>

                <button type="submit" class="btncreate">CREATE ACCOUNT</button>

            </form>

            <div class="divider">
                <span>OR</span>
            </div>

            <div class="socialicons">
                <button class="btnsocial"><i class="fab fa-google"></i>Continue with Google</button>
            </div>
        </main>
    </div>

    <footer>
        <p><a href="#">Contact Us</a></p>
        <p><a href="#">Terms and Conditions</a></p>
    </footer>
    
    </body>
</html>
