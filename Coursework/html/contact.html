<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <link href="/css/basket.css" rel="stylesheet" type="text/css">
    <script src="/js/navbar.js" defer></script>
    <title>Contact Us - UniMarket</title>
    <style>
        .contact-container {
            max-width: 600px;
            margin: 60px auto;
            padding: 40px;
            background: white;
            border-radius: 12px;
            color: #111 !important;
        }
        .contact-container h1 { margin-bottom: 6px; color: #111 !important; }
        .contact-container p { color: #444 !important; line-height: 1.7; }
        .contact-item { margin: 24px 0; }
        .contact-item strong { display: block; margin-bottom: 4px; color: #111 !important; }
        .contact-item a { color: #5a2d82 !important; text-decoration: none; }
        .contact-item a:hover { text-decoration: underline; }
        .back-link { display: inline-block; margin: 30px 0 0 40px; color: white; text-decoration: none; opacity: 0.7; }
        .back-link:hover { opacity: 1; }
    </style>
</head>
<body class="pagecontainer">

    <a href="javascript:history.back()" class="back-link">&#8592; Back</a>

    <div class="contact-container">
        <h1>Contact Us</h1>
        <p>Have a question or issue? Get in touch with the UniMarket team.</p>

        <div class="contact-item">
            <strong>General Enquiries</strong>
            <a href="mailto:support@unimarket.ac.uk">support@unimarket.ac.uk</a>
        </div>

        <div class="contact-item">
            <strong>Report a Listing</strong>
            <a href="mailto:report@unimarket.ac.uk">report@unimarket.ac.uk</a>
        </div>

        <div class="contact-item">
            <strong>Technical Issues</strong>
            <a href="mailto:tech@unimarket.ac.uk">tech@unimarket.ac.uk</a>
        </div>

        <div class="contact-item">
            <strong>Response Time</strong>
            <p style="margin:0;">We aim to respond within 2 working days.</p>
        </div>
    </div>

</body>
</html>
