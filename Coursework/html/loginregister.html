<!DOCTYPE html>
<html lang="en">

    <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <link href="/css/loginregister.css" rel="stylesheet" type="text/css">
    <script src="/js/loginregister.js" defer></script>
    <title>UniMarket</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    </head>

    <body class="page-container">
    <!-- Header -->
    <header class="loginheader">
        <!-- Logo -->
      <a href="/html/unimarket.html"> <h1 class="logo">UniMarket</h1> </a>
    </header>
  
        <div class="centerwrapper">
        <main class="logincard">
            <h2>Welcome back,</h2>
            <form action="#" class="loginform" novalidate>
                <div class="forminput">
                    <input type="email" placeholder="Email" required>
                </div>
                <div class="forminput password-wrapper">
                    <input type="password" placeholder="Password" required>
                    <i id="togglePassword" class="fa fa-eye"></i>
                </div>
                
                <div class="formlinks">
                    <a href="/html/forgotpassword.html">Forgot Password</a>
                    <p>Don't have an account? <a href="/html/createaccount.html">Sign Up</a></p>
                </div>

                <button type="submit" class="btnlogin">LOG IN</button>
            </form>

            <div class="divider">
                <span>OR</span>
            </div>

            <div class="socialicons">
                <button class="btnsocial"><i class="fab fa-google"></i>Continue with Google</button>
            </div>
        </main>
    </div>

    <footer>
        <p><a href="/html/contact.html">Contact Us</a></p>
        <p><a href="/html/terms.html">Terms and Conditions</a></p>
    </footer>
    <div id="toastcontainer"></div>
    </body>
</html>
