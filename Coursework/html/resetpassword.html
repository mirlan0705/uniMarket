<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <link href="/css/resetpassword.css" rel="stylesheet" type="text/css">
    <script src="/js/resetpassword.js" defer></script>
    <title>UniMarket</title>
</head>

<body class="page-container">

        <!-- Header -->
    <header class="loginheader">
        <!-- Logo -->
      <a href="/html/unimarket.html"> <h1 class="logo">UniMarket</h1> </a>
    </header>

       <div class="centerwrapper">
        <main class="logincard">
                <h2>Reset Password</h2>
                <p class="formlinks">Please enter your new password below.</p>

                <form id="resetForm" class="loginform">
                    <div class="forminput">
                        <input type="password" id="newPassword" placeholder="New password" required>
                    </div>
                    
                    <div class="forminput">
                        <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                    </div>

                    <button type="submit" class="btnsend">UPDATE PASSWORD</button>
                    <button type="button"  class="btnback" onclick="window.location.href='/html/loginregister.html';" onclick="window.location.href='/html/createaccount.html';"> BACK TO LOG IN
                    </button>
                </form>
        
                <div id="toastcontainer"></div>
            </main>
        </div>

        <footer>
          <p><a href="#">Contact Us</a></p>
          <p><a href="#">Terms and Conditions</a></p>
        </footer>

   </body>
</html>
